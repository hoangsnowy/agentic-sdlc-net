# Local Postgres for the dev persistence layer.
# Run:  docker compose up -d
# Connection string (set in user-secrets for Api + Web):
#   dotnet user-secrets set "ConnectionStrings:DefaultConnection" \
#     "Host=localhost;Port=5432;Database=agentic_sdlc;Username=postgres;Password=postgres"
services:
  postgres:
    image: postgres:16
    container_name: agentic-sdlc-pg
    environment:
      POSTGRES_DB: agentic_sdlc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agentic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_sdlc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agentic_pgdata:
