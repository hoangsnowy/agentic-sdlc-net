name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/**'
      - '!.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write   # OIDC token for federated credential
  contents: read

env:
  AZURE_RG: rg-Hoang-LuanVan
  CONTAINER_APP: agenticsdlc-${{ github.event.inputs.environment || 'dev' }}
  CONTAINER_APP_WEB: agenticsdlc-web-${{ github.event.inputs.environment || 'dev' }}
  APP_NAME: agenticsdlc
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore + test
        run: |
          dotnet restore AgenticSdlc.sln
          dotnet test AgenticSdlc.sln --configuration Release

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          ACR=$(az acr list -g ${{ env.AZURE_RG }} --query "[0].loginServer" -o tsv)
          if [ -z "$ACR" ]; then
            echo "::error::No ACR in resource group ${{ env.AZURE_RG }}. Run 'az deployment group create ...' first (see infra/README.md)."
            exit 1
          fi
          echo "login_server=$ACR" >> "$GITHUB_OUTPUT"
          ACR_NAME=$(echo "$ACR" | cut -d. -f1)
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build + push images (API + Web)
        env:
          API_IMAGE: ${{ steps.acr.outputs.login_server }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          WEB_IMAGE: ${{ steps.acr.outputs.login_server }}/${{ env.APP_NAME }}-web:${{ env.IMAGE_TAG }}
        run: |
          docker build -t "$API_IMAGE" -f Dockerfile .
          docker push "$API_IMAGE"
          docker build -t "$WEB_IMAGE" -f Dockerfile.web .
          docker push "$WEB_IMAGE"
          echo "Pushed API: $API_IMAGE"
          echo "Pushed Web: $WEB_IMAGE"

      - name: Update Bicep (API + Web image)
        env:
          API_IMAGE: ${{ steps.acr.outputs.login_server }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
          WEB_IMAGE: ${{ steps.acr.outputs.login_server }}/${{ env.APP_NAME }}-web:${{ env.IMAGE_TAG }}
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RG }} \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters containerImage="$API_IMAGE" \
                         webContainerImage="$WEB_IMAGE" \
                         environmentName="${{ github.event.inputs.environment || 'dev' }}" \
                         deployRoleAssignments=false

      - name: Show app URLs
        run: |
          API_FQDN=$(az containerapp show --name ${{ env.CONTAINER_APP }} --resource-group ${{ env.AZURE_RG }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "::notice title=API::https://$API_FQDN"
          echo "::notice title=API Health::https://$API_FQDN/health"
          echo "::notice title=API Scalar::https://$API_FQDN/scalar/v1"
          WEB_FQDN=$(az containerapp show --name ${{ env.CONTAINER_APP_WEB }} --resource-group ${{ env.AZURE_RG }} --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || true)
          if [ -n "$WEB_FQDN" ]; then
            echo "::notice title=Web (Agent Studio)::https://$WEB_FQDN"
          fi
