name: CI

on:
  push:
    branches: [ main, develop, 'refactor/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify SDK
        run: dotnet --info

      - name: Restore
        run: dotnet restore AgentOs.slnx

      - name: Build (Release)
        run: dotnet build AgentOs.slnx --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test AgentOs.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test_results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
